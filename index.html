<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="style.css" rel="stylesheet">
  <title>Notes App</title>
</head>

<body>
  <header>
    <h1 class="app"><i>Notes App</i></h1>

    <form class="input-box">
      <textarea placeholder="Add note" id="input-note" class="input-text"></textarea>
      <button type="submit" id="input-add" class="input-add">&plus;</button>
    </form>
  </header>

  <main>
    <section id="notes-list" class="notes-list">
    </section>
  </main>

  <script src="main.js" type="text/javascript" charset="utf-8" defer></script>
</body>

</html>
